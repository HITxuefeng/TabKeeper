<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>TabKeeper</title>
  <style>
    body {
      width: 220px;
      padding: 16px;
      background: #1a1d27;
      color: #e2e4f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo-text {
      font-weight: 700;
      font-size: 15px;
      background: linear-gradient(135deg, #6c63ff, #ff6584);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat {
      background: #242736;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stat-label { color: #8b8fa8; }
    .stat-value { font-weight: 600; color: #6c63ff; }
    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #6c63ff, #7c73ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 0;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="logo">
    <span>🗂️</span>
    <span class="logo-text">TabKeeper</span>
  </div>
  <div class="stat">
    <span class="stat-label">Open tabs</span>
    <span class="stat-value" id="tabCount">...</span>
  </div>
  <div class="stat">
    <span class="stat-label">Groups</span>
    <span class="stat-value" id="groupCount">...</span>
  </div>
  <button class="btn" id="openManager">Open Tab Manager</button>
  <script src="popup.js"></script>
</body>
</html>
